<!DOCTYPE html>
<html>
<head>
  <title>Poker</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background-color: #0b3d2e;
      color: white;
    }

    .cards {
      margin: 10px;
      font-size: 20px;
    }

    button {
      padding: 10px;
      margin: 5px;
      font-size: 16px;
    }

    #log {
      height: 160px;
      overflow-y: auto;
      border: 1px solid white;
      margin-top: 10px;
      padding: 5px;
      text-align: left;
    }
  </style>
</head>
<body>

<h1>Poker</h1>

<p>Your Money: $<span id="money"></span></p>
<p>Pot: $<span id="pot"></span></p>
<p>Current Bet: $<span id="currentBet"></span></p>

<h3>Your Cards</h3>
<div class="cards" id="playerCards"></div>

<h3>Community Cards</h3>
<div class="cards" id="communityCards"></div>

<button onclick="startHand()">Start Hand</button>
<button onclick="playerAction('check')">Check</button>
<button onclick="playerAction('call')">Call</button>
<button onclick="playerAction('raise')">Raise</button>
<button onclick="playerAction('fold')">Fold</button>
<input type="number" id="raiseAmount" placeholder="Raise amount" min="1" />

<div id="log"></div>

<script src="poker.js"></script>
</body>
</html>
