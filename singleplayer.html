<!DOCTYPE html>
<html>
<head>
  <title>Poker</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b5d2e;
      color: white;
      text-align: center;
    }

    .table {
      width: 900px;
      height: 500px;
      margin: 20px auto;
      background: radial-gradient(circle, #148b3a, #0b6d2e);
      border-radius: 250px;
      position: relative;
      border: 4px solid #0a4d20;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }

    /* CARDS */
    .cards {
      display: flex;
      justify-content: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .card {
      width: 45px;
      height: 65px;
      background: white;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 14px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.4);
    }

    .red { color: #c0392b; }
    .black { color: #2c3e50; }

    /* card back for AI */
    .card-back {
      width: 45px;
      height: 65px;
      background: repeating-linear-gradient(
        45deg,
        #1f618d,
        #1f618d 5px,
        #154360 5px,
        #154360 10px
      );
      border-radius: 6px;
    }

    /* layout */
    .center {
      position: absolute;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .player {
      position: absolute;
      width: 150px;
      font-size: 12px;
    }

    .p0 { bottom: 10px; left: 50%; transform: translateX(-50%); }
    .p1 { top: 10px; left: 50%; transform: translateX(-50%); }
    .p2 { left: 10px; top: 50%; transform: translateY(-50%); }
    .p3 { right: 10px; top: 50%; transform: translateY(-50%); }

    button, input {
      margin: 5px;
      padding: 8px;
    }

    #log {
      width: 900px;
      height: 120px;
      margin: 10px auto;
      background: rgba(0,0,0,0.3);
      overflow-y: auto;
      font-size: 12px;
      text-align: left;
      padding: 10px;
    }
  </style>
</head>

<body>

<h2>Poker</h2>
<h4>version: 4.1</h4>
<div>
  Pot: $<span id="pot"></span> |
  Bet: $<span id="currentBet"></span> |
  Money: $<span id="money"></span>
</div>

<div class="table">

  <!-- AI -->
  <div class="player p1" id="p1"></div>
  <div class="player p2" id="p2"></div>
  <div class="player p3" id="p3"></div>

  <!-- community -->
  <div class="center">
    <div class="cards" id="communityCards"></div>
  </div>

  <!-- player -->
  <div class="player p0">
    <b>You</b>
    <div class="cards" id="playerCards"></div>
  </div>

</div>

<div>
  <input id="raiseAmount" type="number" placeholder="Raise" value="25"/>
  <button onclick="setValue('50')">set raise: 50</button>
  <button onclick="setValue('100')">set raise: 100</button>
  <button onclick="setValue('250')">set raise: 250</button>
  
  <button onclick="playerAction('check')">Check</button>
  <button onclick="playerAction('call')">Call</button>
  <button onclick="playerAction('raise')">Raise</button>
  <button onclick="playerAction('fold')">Fold</button>
  <button onclick="panicmode()">PANICMODE</button>
</div>

<button onclick="startHand()">Start Hand</button>

<div id="log"></div>

<script src="poker.js"></script>

</body>
</html>
