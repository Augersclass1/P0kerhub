<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Poker Game</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0b3d2e;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            background: #145a41;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        h1 {
            margin-bottom: 30px;
        }

        button {
            display: block;
            width: 200px;
            margin: 15px auto;
            padding: 15px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #1abc9c;
            color: white;
            transition: 0.2s;
        }

        button:hover {
            background: #16a085;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Poker</h1>

    <button onclick="goSingle()">Singleplayer</button>
    <button onclick="goMulti()">Multiplayer</button>
</div>

<script>
function goSingle() {
    window.location.href = "singleplayer.html";
}

function goMulti() {
    window.location.href = "multiplayer.html";
}
</script>

</body>
</html>
