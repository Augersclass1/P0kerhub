<!DOCTYPE html>
<html>
<head>
  <title>Poker Host</title>
  <style>
    body {
      font-family: Arial;
      background: #0b3d2e;
      color: white;
      text-align: center;
    }

    #table {
      width: 80%;
      margin: auto;
      padding: 20px;
      border-radius: 20px;
      background: #145c43;
      margin-top: 20px;
    }

    .card {
      display: inline-block;
      padding: 5px 8px;
      margin: 2px;
      background: white;
      color: black;
      border-radius: 5px;
    }

    button {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.8;
    }

    .panel {
      background: rgba(255,255,255,0.1);
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
    }
  </style>
</head>

<body>
  <h1>Poker Host (Player 0)</h1>

  <button onclick="createOffer()">Create Game</button>

  <h3>Offer</h3>
  <textarea id="offerBox" style="width:90%;height:120px;"></textarea>

  <h3>Answer</h3>
  <textarea id="answerBox" style="width:90%;height:120px;"></textarea>
  <button onclick="acceptAnswer()">Connect</button>

  <div id="table">
    <h2>Phase: <span id="phase"></span></h2>
    <h3>Pot: $<span id="pot"></span></h3>
    <h3>Turn: <span id="turn"></span></h3>

    <h3>Community Cards</h3>
    <div id="community"></div>

    <h3>Players</h3>
    <div id="players"></div>

    <hr>

    <button onclick="playerAction({type:'check'})">Check</button>
    <button onclick="playerAction({type:'call'})">Call</button>
    <button onclick="playerAction({type:'bet', amount:50})">Bet 50</button>
    <button onclick="playerAction({type:'fold'})">Fold</button>
    <button onclick="startGame()">Start Game</button>
  </div>

  <script src="multiplayer.js"></script>
</body>
</html>
