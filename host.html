<!DOCTYPE html>
<html>
<head>
  <title>Poker Host</title>
  <style>
    body { font-family: Arial; background:#0b3d2e; color:white; text-align:center; }

    .table {
      width: 80%;
      margin: auto;
      background: #145c43;
      padding: 20px;
      border-radius: 20px;
    }

    button {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
    }

    .card {
      display:inline-block;
      padding:6px;
      background:white;
      color:black;
      margin:2px;
      border-radius:5px;
    }

    .panel {
      background: rgba(255,255,255,0.1);
      padding:10px;
      margin:5px;
      border-radius:10px;
    }
  </style>
</head>

<body>
<h1>HOST (Player 0)</h1>

<button onclick="createOffer()">Create Game</button>

<textarea id="offerBox" style="width:90%;height:120px;"></textarea>
<textarea id="answerBox" style="width:90%;height:120px;"></textarea>
<button onclick="acceptAnswer()">Connect</button>

<hr>

<button onclick="startGame()">Start Game</button>
<button onclick="playerAction({type:'bet', amount:50})">Bet 50</button>
<button onclick="playerAction({type:'call'})">Call</button>
<button onclick="playerAction({type:'fold'})">Fold</button>

<div class="table">
  <h2>Phase: <span id="phase"></span></h2>
  <h3>Pot: $<span id="pot"></span></h3>
  <h3>Turn: <span id="turn"></span></h3>

  <h3>Community</h3>
  <div id="community"></div>

  <h3>Players</h3>
  <div id="players"></div>
</div>

<script src="multiplayer.js"></script>
</body>
</html>
